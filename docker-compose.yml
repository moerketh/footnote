services:
  api:
    build: .
    command: python api/main.py
    ports:
      - "8000:8000"
    volumes:
      - db-data:/data/db
    environment:
      - DB_PATH=/data/db/footnote.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - INGEST_TOKEN=${INGEST_TOKEN:-dev-token}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    environment:
      - API_UPSTREAM=api:8000
    restart: unless-stopped

  pipeline:
    build: .
    command: python pipeline.py
    volumes:
      - repo-data:/data/repos
    environment:
      - API_URL=http://api:8000
      - INGEST_TOKEN=${INGEST_TOKEN:-dev-token}
      - DATA_DIR=/data/repos
      - CONFIG_PATH=repos.json
      - BACKFILL_DAYS=${BACKFILL_DAYS:-30}
      - CLONE_DEPTH=${CLONE_DEPTH:-6000}
      - CLOUD_OLLAMA_URL=${CLOUD_OLLAMA_URL}
      - CLOUD_MODEL=${CLOUD_MODEL:-kimi-k2.5}
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - LOCAL_OLLAMA_URL=${LOCAL_OLLAMA_URL:-}
      - LOCAL_MODEL=${LOCAL_MODEL:-gemma4:26b}
      - PREFILTER_THRESHOLD=${PREFILTER_THRESHOLD:-3}
      - MIN_STORE_SCORE=${MIN_STORE_SCORE:-0}
    profiles:
      - pipeline

volumes:
  db-data:
  repo-data:
