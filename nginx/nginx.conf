server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API endpoints (prefix matches — no regex, no resolver needed)
    # Note: no proxy_set_header Host $host — Container Apps internal ingress
    # routes by Host header, so we must let nginx send the upstream hostname.
    location /health {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/health;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    location /stats {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/stats;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    location /changes {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /tags {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/tags;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    location /services {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/services;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # Ingest endpoints (used by pipeline in local dev; in Azure, pipeline calls API directly)
    location /ingest/ {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/ingest/;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /feed {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/feed;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # General API prefix
    location /api/ {
        proxy_pass http://API_UPSTREAM_PLACEHOLDER/;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Frontend - Svelte app (catch-all for SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
